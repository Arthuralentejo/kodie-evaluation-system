services:
  - type: web
    name: kodie-backend
    env: python
    rootDir: backend
    buildCommand: pip install poetry && poetry install --only main
    startCommand: poetry run uvicorn app.main:app --host 0.0.0.0 --port $PORT

  - type: web
    name: kodie-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: kodie-backend
          property: host
